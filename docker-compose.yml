version: '3.8'

services:
  postgres:
    image: postgres:17.5
    container_name: cars-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d

  telegrambot:
    build: ./telegrambot
    env_file:
      - .env
    ports:
      - "3001:3001"
    restart: unless-stopped
    depends_on:
      - datahub

  datahub:
    build: ./datahub
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    container_name: carcatch-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - datahub
      - telegrambot
      - pyparsers
      - telegramapp
    restart: unless-stopped

  pyparsers:
    build: ./pyparsers
    env_file:
      - .env
    ports:
      - "5000:5000"
    restart: unless-stopped

  telegramapp:
    build: ./telegramapp
    restart: unless-stopped
    ports:
      - "3002:80"

  cron-updater:
    build: ./init-scripts
    volumes:
      - ./init-scripts:/init-scripts
      - ./car-updater.log:/init-scripts/car-updater.log
    depends_on:
      - datahub
    restart: unless-stopped

volumes:
  pg_data: