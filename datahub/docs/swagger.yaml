basePath: /
host: localhost:8080
info:
  contact:
    email: support@example.com
    name: API Support
    url: http://www.example.com/support
  description: API для работы с машинами, фильтрами и обновлениями из внешних источников.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://example.com/terms/
  title: Cars API
  version: "1.0"
paths:
  /cars:
    get:
      consumes:
      - application/json
      description: Список машин с фильтрами и пагинацией
      parameters:
      - description: Номер страницы
        in: query
        name: page
        type: integer
      - description: Размер страницы
        in: query
        name: limit
        type: integer
      - description: Источник
        in: query
        name: source
        type: string
      - description: Бренд
        in: query
        name: brand
        type: string
      - description: Город
        in: query
        name: city
        type: string
      - description: Год
        in: query
        name: year
        type: string
      - description: Поиск
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Получить список машин
      tags:
      - cars
  /checkcar:
    post:
      consumes:
      - application/json
      description: Проверяет наличие и детали машины по источнику (dongchedi/che168)
        и id/url
      parameters:
      - description: Данные для проверки
        in: body
        name: request
        required: true
        schema:
          properties:
            car_id:
              type: string
            car_url:
              type: string
            source:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Проверить машину по источнику и id/url
      tags:
      - cars
  /update/{source}:
    post:
      consumes:
      - application/json
      description: Запускает обновление последних N записей для источника (dongchedi/che168)
      parameters:
      - description: Источник
        in: path
        name: source
        required: true
        type: string
      - description: Сколько последних обновить
        in: body
        name: request
        required: true
        schema:
          properties:
            last_n:
              type: integer
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Инкрементальное обновление источника
      tags:
      - update
  /update/{source}/full:
    get:
      description: Запускает полное обновление данных для источника (dongchedi/che168)
      parameters:
      - description: Источник
        in: path
        name: source
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Полное обновление источника
      tags:
      - update
swagger: "2.0"
