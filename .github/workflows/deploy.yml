name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      SSH_USER: ${{ secrets.SSH_USER }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare CI env file
        shell: bash
        run: |
          set -euo pipefail
          cat > pyparsers/.env <<'EOF'
          ALLOWED_IPS=127.0.0.1,::1
          DATAHUB_URL=http://127.0.0.1:8080
          DATAHUB_TIMEOUT=1800
          DONGCHEDI_ENHANCE_MAX_CONCURRENT=5
          CHE168_BATCH_MAX_CONCURRENT=5
          INCREMENTAL_EXISTING_LIMIT=15000
          PERF_ATTACH_BODY=false
          CORS_ALLOW_ORIGINS=*
          CORS_ALLOW_CREDENTIALS=true
          CORS_ALLOW_METHODS=GET,POST,PUT,DELETE,OPTIONS
          CORS_ALLOW_HEADERS=*
          TASK_TTL_HOURS=24
          MAX_TASKS=1000
          EOF

      - name: Validate docker compose
        run: docker compose config -q

      - name: Prepare SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${SSH_PORT}" "${SSH_HOST}" >> ~/.ssh/known_hosts

      - name: Pack release
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_TAR="/tmp/pyparsers-release.tar.gz"
          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=pyparsers/.env \
            -czf "${RELEASE_TAR}" .

      - name: Upload release archive
        shell: bash
        run: |
          set -euo pipefail
          scp -P "${SSH_PORT}" /tmp/pyparsers-release.tar.gz "${SSH_USER}@${SSH_HOST}:/tmp/pyparsers-release.tar.gz"

      - name: Deploy on server
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_PATH_VALUE="${DEPLOY_PATH:-/home/${SSH_USER}/pyparsers}"
          ssh -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" '
            set -euxo pipefail
            DEPLOY_PATH="'"${DEPLOY_PATH_VALUE}"'"
            mkdir -p "${DEPLOY_PATH}"
            tar -xzf /tmp/pyparsers-release.tar.gz -C "${DEPLOY_PATH}"
            cd "${DEPLOY_PATH}"
            pwd
            ls -la
            ls -la pyparsers
            test -f pyparsers/.env
            docker compose version
            docker compose config -q
            docker compose up -d --build --remove-orphans
            docker compose ps
          '
