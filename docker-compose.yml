services:
  pyparsers-dongchedi:
    build:
      context: ./pyparsers
      dockerfile: Dockerfile
    container_name: carcatch-pyparsers-dongchedi
    env_file:
      - ./pyparsers/.env
    command: ["granian", "--interface", "asgi", "--host", "0.0.0.0", "--port", "5000", "--http1-keep-alive", "app_dongchedi:app"]
    ports:
      - "5001:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--timeout=5", "http://127.0.0.1:5000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    mem_limit: 4g
    init: true

  pyparsers-che168:
    build:
      context: ./pyparsers
      dockerfile: Dockerfile
    container_name: carcatch-pyparsers-che168
    env_file:
      - ./pyparsers/.env
    command: ["granian", "--interface", "asgi", "--host", "0.0.0.0", "--port", "5000", "--http1-keep-alive", "app_che168:app"]
    ports:
      - "5002:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--timeout=5", "http://127.0.0.1:5000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    mem_limit: 4g
    init: true

networks:
  default:
    driver: bridge

