services:
  # Database
  postgres:
    image: postgres:17.5-alpine
    container_name: carcatch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    expose:
      - "5432"
    ports:
      - "4827:5432"
    volumes:
      - carsparser_pg_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - carcatch-network
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /var/run/postgresql

  # Translation Service
  translator:
    build:
      context: ./translator
      dockerfile: Dockerfile
    container_name: carcatch-translator
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    expose:
      - "8000"
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - carcatch-network
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

  # Redis for Translation Cache
  redis:
    build:
      context: ./translator
      dockerfile: Dockerfile.redis
    container_name: carcatch-redis
    expose:
      - "6379"
    restart: unless-stopped
    volumes:
      - carcatch_redis_data:/data
    networks:
      - carcatch-network
    security_opt:
      - no-new-privileges:true

  # Core API Services
  datahub:
    build:
      context: ./datahub
      dockerfile: Dockerfile
    container_name: carcatch-datahub
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - API_BASE_URL=http://pyparsers:5000
      - TRANSLATOR_URL=http://translator:8000
      - TRANSLATION_ENABLED=true
      - NODE_ENV=production
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_started
      translator:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/cars"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - carcatch-network
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

  pyparsers:
    build:
      context: ./pyparsers
      dockerfile: Dockerfile
    container_name: carcatch-pyparsers
    env_file:
      - .env
    environment:
      - DATAHUB_URL=http://datahub:8080   # URL для push результатов
    expose:
      - "5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--timeout=5", "http://127.0.0.1:5000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - carcatch-network
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

  # Telegram Services
  telegrambot:
    build:
      context: ./telegrambot
      dockerfile: Dockerfile
    container_name: carcatch-telegrambot
    env_file:
      - .env
    environment:
      - DATAHUB_URL=http://datahub:8080
    expose:
      - "3001"
    restart: unless-stopped
    depends_on:
      datahub:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - carcatch-network
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

  # Admin Bot
  adminbot:
    build:
      context: ./adminbot
      dockerfile: Dockerfile
    container_name: carcatch-adminbot
    env_file:
      - .env
    environment:
      - DATAHUB_URL=http://datahub:8080
      - ADMIN_SERVICE_URL=http://adminservice:8080
    expose:
      - "8000"
    restart: unless-stopped
    depends_on:
      datahub:
        condition: service_started
      adminservice:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - carcatch-network
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

  # Admin PostgreSQL Database
  admin-postgres:
    image: postgres:17.5-alpine
    container_name: carcatch-admin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${ADMIN_POSTGRES_USER}
      POSTGRES_PASSWORD: ${ADMIN_POSTGRES_PASSWORD}
      POSTGRES_DB: adminservice
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    expose:
      - "5432"
    volumes:
      - carsparser_admin_pg_data:/var/lib/postgresql/data
    networks:
      - carcatch-network
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /var/run/postgresql

  # Admin Service (.NET 8)
  adminservice:
    build:
      context: ./adminservice/Adminservice
      dockerfile: Dockerfile
    container_name: carcatch-adminservice
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ADMIN_POSTGRES_HOST=admin-postgres
      - ADMIN_POSTGRES_USER=${ADMIN_POSTGRES_USER}
      - ADMIN_POSTGRES_PASSWORD=${ADMIN_POSTGRES_PASSWORD}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ADMIN_BOT_INTERNAL_URL=http://adminbot:8000
    expose:
      - "8080"
    depends_on:
      admin-postgres:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - carcatch-network
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

  # Admin Web (React)
  adminweb:
    build:
      context: ./adminweb
      dockerfile: Dockerfile
    container_name: carcatch-adminweb
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      adminservice:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - carcatch-network
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

  # Frontend Applications
  telegramapp:
    build:
      context: ./telegramapp
      dockerfile: Dockerfile
    container_name: carcatch-telegramapp
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      datahub:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - carcatch-network
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

  # Reverse Proxy
  nginx:
    image: nginx:1.25-alpine
    container_name: carcatch-nginx
    command: sh -c "sleep 10 && nginx -g 'daemon off;'"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
      - nginx_cache:/var/cache/nginx
      - nginx_temp:/var/cache/nginx/temp
    depends_on:
      datahub:
        condition: service_healthy
      pyparsers:
        condition: service_healthy
      telegrambot:
        condition: service_healthy
      adminbot:
        condition: service_started
      telegramapp:
        condition: service_healthy
      adminweb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - carcatch-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    tmpfs:
      - /var/run

  # Background Services
  cron-updater:
    build:
      context: ./init-scripts
      dockerfile: Dockerfile
    container_name: carcatch-cron-updater
    volumes:
      - ./init-scripts:/init-scripts:ro
      - ./logs/cron:/logs
    environment:
      - DATAHUB_URL=http://datahub:8080
      - PYPARSERS_URL=http://pyparsers:5000
    depends_on:
      - datahub
      - pyparsers
    restart: unless-stopped
    networks:
      - carcatch-network
    security_opt:
      - no-new-privileges:true

volumes:
  carsparser_pg_data:
    driver: local
  carsparser_admin_pg_data:
    driver: local
  carcatch_redis_data:
    driver: local
  nginx_cache:
    driver: local
  nginx_temp:
    driver: local

networks:
  carcatch-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1
    driver_opts:
      com.docker.network.bridge.name: carcatch0
      com.docker.network.driver.mtu: 1500