# Docker Compose для тестового контейнера che168 галереи

services:
  test-che168-gallery:
    build:
      context: .
      dockerfile: test-che168-dockerfile
    container_name: test-che168-gallery-parser
    volumes:
      - .:/app
      - ./test_results:/app/test_results
    environment:
      - CHROMEDRIVER_PATH=/usr/local/bin/chromedriver
      - CHROME_BIN=/usr/bin/google-chrome
    network_mode: host
    stdin_open: true
    tty: true

networks:
  default:
    driver: bridge



