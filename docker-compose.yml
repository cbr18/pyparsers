version: '3.8'

services:
  # Database
  postgres:
    image: postgres:17.5
    container_name: cars-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    # Uncomment for production to hide database port
    # ports: []
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - carcatch-network

  # Core API Services
  datahub:
    build:
      context: ./datahub
      dockerfile: Dockerfile
    container_name: carcatch-datahub
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - API_BASE_URL=http://pyparsers:5000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/cars"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - carcatch-network

  pyparsers:
    build:
      context: ./pyparsers
      dockerfile: Dockerfile
    container_name: carcatch-pyparsers
    env_file:
      - .env
    ports:
      - "5000:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - carcatch-network

  # Telegram Services
  telegrambot:
    build:
      context: ./telegrambot
      dockerfile: Dockerfile
    container_name: carcatch-telegrambot
    env_file:
      - .env
    ports:
      - "3001:3001"
    restart: unless-stopped
    depends_on:
      datahub:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - carcatch-network

  # Frontend Applications
  telegramapp:
    build:
      context: ./telegramapp
      dockerfile: Dockerfile
    container_name: carcatch-telegramapp
    restart: unless-stopped
    ports:
      - "3002:80"
    depends_on:
      - datahub
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - carcatch-network

  telegramngapp:
    build:
      context: ./telegramngapp
      dockerfile: Dockerfile
    container_name: carcatch-telegramngapp
    restart: unless-stopped
    ports:
      - "3003:80"
    depends_on:
      - datahub
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - carcatch-network

  # Reverse Proxy
  nginx:
    image: nginx:1.25-alpine
    container_name: carcatch-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      datahub:
        condition: service_healthy
      pyparsers:
        condition: service_healthy
      telegrambot:
        condition: service_healthy
      telegramapp:
        condition: service_healthy
      telegramngapp:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - carcatch-network

  # Background Services
  cron-updater:
    build:
      context: ./init-scripts
      dockerfile: Dockerfile
    container_name: carcatch-cron-updater
    volumes:
      - ./init-scripts:/init-scripts
      - ./logs:/logs
    depends_on:
      datahub:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - carcatch-network

  # Optional: ASP.NET DataHub (if needed)
  # aspdatahub:
  #   build:
  #     context: ./aspdatahub
  #     dockerfile: Dockerfile
  #   container_name: carcatch-aspdatahub
  #   ports:
  #     - "5001:80"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   restart: unless-stopped
  #   networks:
  #     - carcatch-network

volumes:
  pg_data:
    driver: local

networks:
  carcatch-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
