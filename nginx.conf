# Error and access log configuration
error_log /var/log/nginx/error.log warn;
access_log /var/log/nginx/access.log combined buffer=16k flush=2m;

# Upstream definitions with health checks and load balancing
upstream datahub_backend {
    least_conn;
    server datahub:8080 max_fails=3 fail_timeout=5400s weight=1;
    keepalive 32;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

upstream pyparsers_dongchedi_backend {
    least_conn;
    server pyparsers-dongchedi:5000 max_fails=3 fail_timeout=5400s weight=1;
    keepalive 16;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

upstream pyparsers_che168_backend {
    least_conn;
    server pyparsers-che168:5000 max_fails=3 fail_timeout=5400s weight=1;
    keepalive 16;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

upstream telegrambot_backend {
    least_conn;
    server telegrambot:3001 max_fails=3 fail_timeout=30s weight=1;
    keepalive 16;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

upstream telegramapp_backend {
    least_conn;
    server telegramapp:80 max_fails=3 fail_timeout=30s weight=1;
    keepalive 32;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

upstream adminbot_backend {
    least_conn;
    server adminbot:8000 max_fails=3 fail_timeout=30s weight=1;
    keepalive 16;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

upstream adminservice_backend {
    least_conn;
    server adminservice:8080 max_fails=3 fail_timeout=30s weight=1;
    keepalive 16;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

upstream adminweb_backend {
    least_conn;
    server adminweb:80 max_fails=3 fail_timeout=30s weight=1;
    keepalive 32;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

# Rate limiting zones with better granularity
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=15r/s;
limit_req_zone $binary_remote_addr zone=bot_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=static_limit:10m rate=50r/s;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;

# Cache configuration
proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:20m max_size=200m inactive=120m use_temp_path=off;
proxy_cache_path /var/cache/nginx/static levels=1:2 keys_zone=static_cache:10m max_size=100m inactive=1d use_temp_path=off;

# Temporary directories
proxy_temp_path /var/cache/nginx/temp;

# Map for real IP detection
map $http_x_forwarded_for $real_ip {
    ~^([0-9.]+) $1;
    default $remote_addr;
}

# Security headers map
map $sent_http_content_type $security_headers {
    ~*text/html "nosniff";
    default "";
}

# HTTPS redirect server (when SSL is enabled)
server {
    listen 80;
    server_name car-catch.ru www.car-catch.ru;
    return 301 https://$server_name$request_uri;
}

# Health check server (no redirect for localhost)
server {
    listen 80;
    server_name localhost 127.0.0.1;
    
    location = /health {
        access_log off;
        add_header Content-Type text/plain always;
        return 200 "healthy\n";
    }
    
    # Proxy all other requests to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# Main server block
server {
    server_name car-catch.ru www.car-catch.ru localhost;

    # SSL Configuration
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Basic server configuration
    client_max_body_size 16m;
    client_body_buffer_size 128k;
    client_header_buffer_size 3m;
    large_client_header_buffers 4 256k;

    # Timeout settings
    client_body_timeout 60s;
    client_header_timeout 60s;
    send_timeout 60s;

    # Connection limits
    limit_conn conn_limit_per_ip 20;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Real-IP $real_ip always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always; # Uncomment for HTTPS

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        text/json
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        application/rdf+xml
        image/svg+xml
        font/woff
        font/woff2;

    # Health check endpoint
    location = /health {
        access_log off;
        add_header Content-Type text/plain always;
        return 200 "healthy\n";
    }

    # Test pages (removed)


    # Robots.txt
    location = /robots.txt {
        access_log off;
        log_not_found off;
        add_header Content-Type text/plain always;
        return 200 "User-agent: *\nDisallow: /api/\nAllow: /\n";
    }

    # Frontend Application
    # Redirect path without trailing slash to ensure upstream location matches
    location = /podbortg {
        return 301 $scheme://$host/podbortg/;
    }

    location /podbortg/ {
        limit_req zone=general_limit burst=50 nodelay;

        proxy_pass http://telegramapp_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        proxy_cache_bypass $http_upgrade;

        # CORS headers for web app
        add_header 'Access-Control-Allow-Origin' '$http_origin' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Accept,Authorization,Cache-Control,Content-Type,DNT,If-Modified-Since,Keep-Alive,Origin,User-Agent,X-Requested-With' always;

        # Handle preflight requests
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # Image proxy for external images (CORS bypass)
    # Usage: /proxy-image?url=https://example.com/img.jpg (не нужно кодировать вручную!)
    location = /proxy-image {
        limit_req zone=static_limit burst=50 nodelay;

        # Read URL from query string (nginx автоматически декодирует $arg_url)
        set $target_url $arg_url;
        if ($target_url = "") { return 400 "Missing 'url' query param"; }

        # Extract upstream host from target URL
        set $upstream_host "";
        if ($target_url ~* ^https?://([^/]+)) { set $upstream_host $1; }

        # Set referer policy for hotlink-protected hosts
        set $image_referer "";
        if ($upstream_host ~* (?:^|\.)autoimg\.cn$) { set $image_referer "https://www.che168.com/"; }
        if ($upstream_host ~* (?:^|\.)byteimg\.com$) { set $image_referer "https://www.dongchedi.com/"; }

        # DNS + TLS SNI for dynamic HTTPS upstreams
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        proxy_ssl_server_name on;
        proxy_ssl_name $upstream_host;
        proxy_ssl_verify off;

        # Proxy request
        proxy_pass $target_url;
        proxy_http_version 1.1;

        # Preserve proper Host for upstream (enables SNI); set referer if required
        proxy_set_header Host $upstream_host;
        proxy_set_header Referer $image_referer;
        proxy_set_header Origin "";
        proxy_set_header Connection "";

        # Reasonable image Accept headers
        proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36";
        proxy_set_header Accept "image/avif,image/webp,image/apng,image/svg+xml,image/*,*/*;q=0.8";
        proxy_set_header Accept-Language "en-US,en;q=0.9,ru;q=0.8";

        # Streaming
        proxy_buffering off;
        proxy_request_buffering off;

        # Timeouts (увеличены для медленных китайских CDN)
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Cache images for 1 hour
        proxy_cache static_cache;
        proxy_cache_valid 200 1h;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;

        # Minimal response headers
        add_header Cache-Control "public, max-age=36000" always;
        add_header Cache-Control "public, max-age=36000" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET" always;
        add_header Referrer-Policy "no-referrer" always;

        # Errors (return upstream status to help diagnose 403/404)
        proxy_intercept_errors off;

        # Logs (use default)
    }

    # Error handler for image proxy
    location @image_error {
        add_header Content-Type image/svg+xml always;
        add_header Cache-Control "no-cache" always;
        add_header X-Proxy-Error "true" always;
        return 200 '<svg xmlns="http://www.w3.org/2000/svg" width="120" height="80"><rect width="100%" height="100%" fill="#ccc"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#666" font-size="12">Ошибка загрузки</text></svg>';
    }

    # Static assets caching for frontend
    location ~* ^/podbortg/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        limit_req zone=static_limit burst=100 nodelay;

        proxy_pass http://telegramapp_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;

        proxy_cache static_cache;
        proxy_cache_valid 200 304 1d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;

        add_header X-Cache-Status $upstream_cache_status always;
        add_header Cache-Control "public, max-age=86400" always;

        expires 1d;
    }

    # API Endpoints - Main API
    location /api/ {
        limit_req zone=api_limit burst=30 nodelay;

        proxy_pass http://datahub_backend/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        proxy_connect_timeout 60s;
        proxy_send_timeout 5400s;
        proxy_read_timeout 5400s;
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 16 8k;

        # API caching for GET requests
        # Обход кеша если есть заголовок Cache-Control: no-cache или параметр nocache=1
        set $no_cache 0;
        if ($http_cache_control ~* "no-cache") {
            set $no_cache 1;
        }
        if ($arg_nocache) {
            set $no_cache 1;
        }
        
        proxy_cache api_cache;
        proxy_cache_methods GET HEAD;
        proxy_cache_valid 200 1m;  # Уменьшено с 5m до 1m для более быстрого обновления
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_bypass $no_cache;
        proxy_no_cache $no_cache;

        add_header X-Cache-Status $upstream_cache_status always;

        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Accept,Authorization,Cache-Control,Content-Type,DNT,If-Modified-Since,Keep-Alive,Origin,User-Agent,X-Requested-With' always;

        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # Enhancement endpoints
    location ~ ^/enhancement/(.*)$ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://datahub_backend/enhancement/$1;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        proxy_connect_timeout 60s;
        proxy_send_timeout 5400s;
        proxy_read_timeout 5400s;
        proxy_buffering off;

        # No caching for enhancement operations
        proxy_no_cache 1;
        proxy_cache_bypass 1;

        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;

        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Accept,Authorization,Cache-Control,Content-Type,DNT,If-Modified-Since,Keep-Alive,Origin,User-Agent,X-Requested-With' always;

        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # Direct API endpoints
    location ~ ^/(cars|brands|checkcar|update)(.*)$ {
        limit_req zone=api_limit burst=30 nodelay;

        proxy_pass http://datahub_backend$1$2;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        proxy_connect_timeout 60s;
        proxy_send_timeout 5400s;
        proxy_read_timeout 5400s;
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 16 8k;

        # Caching for read operations
        set $no_cache 0;
        if ($request_method != GET) {
            set $no_cache 1;
        }

        proxy_cache api_cache;
        proxy_cache_bypass $no_cache;
        proxy_cache_valid 200 5m;
        proxy_cache_valid 404 1m;
        proxy_no_cache $no_cache;

        add_header X-Cache-Status $upstream_cache_status always;

        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Accept,Authorization,Cache-Control,Content-Type,DNT,If-Modified-Since,Keep-Alive,Origin,User-Agent,X-Requested-With' always;

        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # Update endpoints (datahub)
    location ~ ^/update/(.*)$ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://datahub_backend/update/$1;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        proxy_connect_timeout 60s;
        proxy_send_timeout 5400s;
        proxy_read_timeout 5400s;
        proxy_buffering off;

        # No caching for update operations
        proxy_no_cache 1;
        proxy_cache_bypass 1;

        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Python parsers API
    location = /pyparsers {
        return 301 /pyparsers/;
    }

    location = /pyparsers/health {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://pyparsers_dongchedi_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        proxy_connect_timeout 60s;
        proxy_send_timeout 5400s;
        proxy_read_timeout 5400s;
        proxy_buffering off;

        proxy_no_cache 1;
        proxy_cache_bypass 1;

        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location ~ ^/pyparsers/(cars/dongchedi(?:/.*)?|update/dongchedi(?:/.*)?)$ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://pyparsers_dongchedi_backend/$1$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        proxy_connect_timeout 60s;
        proxy_send_timeout 5400s;
        proxy_read_timeout 5400s;
        proxy_buffering off;

        proxy_no_cache 1;
        proxy_cache_bypass 1;

        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location ~ ^/pyparsers/(cars/che168(?:/.*)?|update/che168(?:/.*)?|che168/detailed(?:/.*)?)$ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://pyparsers_che168_backend/$1$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        proxy_connect_timeout 60s;
        proxy_send_timeout 5400s;
        proxy_read_timeout 5400s;
        proxy_buffering off;

        # No caching for parsers (dynamic content)
        proxy_no_cache 1;
        proxy_cache_bypass 1;

        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Telegram Bot API
    location /bot {
        limit_req zone=bot_limit burst=20 nodelay;

        proxy_pass http://telegrambot_backend/bot;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        proxy_connect_timeout 10s;
        
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # Lead generation endpoint
    location /lead {
        limit_req zone=bot_limit burst=10 nodelay;

        proxy_pass http://telegrambot_backend/lead;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # Admin Bot API
    location /admin-bot {
        limit_req zone=bot_limit burst=20 nodelay;

        proxy_pass http://adminbot_backend/bot;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # Admin Bot Lead endpoint
    location /admin-lead {
        limit_req zone=bot_limit burst=10 nodelay;

        proxy_pass http://adminbot_backend/lead;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # Admin Service API
    location /api/admin-service/ {
        limit_req zone=api_limit burst=30 nodelay;

        proxy_pass http://adminservice_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 16 8k;

        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Accept,Authorization,Cache-Control,Content-Type,DNT,If-Modified-Since,Keep-Alive,Origin,User-Agent,X-Requested-With' always;

        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # Admin Web Application
    location /adminpage206/ {
        limit_req zone=general_limit burst=50 nodelay;

        rewrite ^/adminpage206/(.*)$ /$1 break;

        proxy_pass http://adminweb_backend$uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        proxy_cache_bypass $http_upgrade;
    }

    # Redirect /adminpage206 to /adminpage206/
    location = /adminpage206 {
        return 301 $scheme://$host/adminpage206/;
    }

    # Static assets caching for admin web
    location ~* ^/adminpage206/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        limit_req zone=static_limit burst=100 nodelay;

        rewrite ^/adminpage206/(.*)$ /$1 break;

        proxy_pass http://adminweb_backend$uri;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;

        proxy_cache static_cache;
        proxy_cache_valid 200 304 1d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;

        add_header X-Cache-Status $upstream_cache_status always;
        add_header Cache-Control "public, max-age=86400" always;

        expires 1d;
    }

    # Documentation endpoints
    location = /docs {
        limit_req zone=general_limit burst=20 nodelay;

        proxy_pass http://pyparsers_dongchedi_backend/docs;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache documentation
        proxy_cache api_cache;
        proxy_cache_valid 200 1h;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    location = /pyparsers/dongchedi/docs {
        limit_req zone=general_limit burst=20 nodelay;

        proxy_pass http://pyparsers_dongchedi_backend/docs;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache api_cache;
        proxy_cache_valid 200 1h;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    location = /pyparsers/che168/docs {
        limit_req zone=general_limit burst=20 nodelay;

        proxy_pass http://pyparsers_che168_backend/docs;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache api_cache;
        proxy_cache_valid 200 1h;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    location /swagger {
        limit_req zone=general_limit burst=20 nodelay;

        proxy_pass http://datahub_backend/swagger;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache swagger UI
        proxy_cache api_cache;
        proxy_cache_valid 200 30m;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    # Default redirect to external site
    location = / {
        return 301 https://gzkauto.ru/;
    }

    # Block access to sensitive files
    location ~ /\.(git|env|htaccess|htpasswd) {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    # Block access to backup files
    location ~ \.(bak|backup|swp|tmp)$ {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    # Custom error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    location = /404.html {
        internal;
        add_header Content-Type text/html always;
        return 404 '<!DOCTYPE html><html><head><title>404 Not Found</title></head><body><h1>404 Not Found</h1><p>The requested resource was not found.</p></body></html>';
    }

    location = /50x.html {
        internal;
        add_header Content-Type text/html always;
        return 500 '<!DOCTYPE html><html><head><title>Server Error</title></head><body><h1>Server Error</h1><p>Something went wrong. Please try again later.</p></body></html>';
    }
}
