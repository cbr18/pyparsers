name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker compose
        run: docker compose config -q

      - name: Build parser images
        run: docker compose build pyparsers-dongchedi pyparsers-che168
