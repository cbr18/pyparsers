x-parser-runtime: &parser-runtime
  dns:
    - 223.5.5.5
    - 1.1.1.1
    - 8.8.8.8
  dns_opt:
    - timeout:2
    - attempts:2
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  pyparsers-dongchedi:
    <<: *parser-runtime
    image: pyparsers-app:latest
    pull_policy: never
    build:
      context: ./pyparsers
      dockerfile: Dockerfile
      target: app
    container_name: carcatch-pyparsers-dongchedi
    env_file:
      - ./.env
    command: ["granian", "--interface", "asgi", "--workers", "1", "--host", "0.0.0.0", "--port", "5000", "--http1-keep-alive", "app_dongchedi:app"]
    ports:
      - "5001:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--timeout=5", "http://127.0.0.1:5000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    mem_limit: 4g
    init: true

  pyparsers-che168:
    <<: *parser-runtime
    image: pyparsers-app:latest
    pull_policy: never
    depends_on:
      - pyparsers-dongchedi
    container_name: carcatch-pyparsers-che168
    env_file:
      - ./.env
    command: ["granian", "--interface", "asgi", "--workers", "1", "--host", "0.0.0.0", "--port", "5000", "--http1-keep-alive", "app_che168:app"]
    ports:
      - "5002:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--timeout=5", "http://127.0.0.1:5000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    mem_limit: 4g
    init: true

  pyparsers-encar:
    <<: *parser-runtime
    image: pyparsers-app:latest
    pull_policy: never
    container_name: carcatch-pyparsers-encar
    env_file:
      - ./.env
    command: ["granian", "--interface", "asgi", "--workers", "1", "--host", "0.0.0.0", "--port", "5000", "--http1-keep-alive", "app_encar:app"]
    ports:
      - "5003:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--timeout=5", "http://127.0.0.1:5000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    mem_limit: 4g
    init: true

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16
