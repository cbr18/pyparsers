# Docker Compose для тестового контейнера dongchedi парсинга

services:
  test-dongchedi:
    build:
      context: .
      dockerfile: test-dockerfile
    container_name: test-dongchedi-parser
    volumes:
      - .:/app
      - ./test_results:/app/test_results
    environment:
      - CHROMEDRIVER_PATH=/usr/local/bin/chromedriver
      - CHROME_BIN=/usr/bin/google-chrome
    network_mode: host
    stdin_open: true
    tty: true

networks:
  default:
    driver: bridge

